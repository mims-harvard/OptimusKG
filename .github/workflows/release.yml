name: Release

on:
  push:
    branches: main

env:
  PYTHON_VERSION: 3.12
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
  VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        id: setup-uv
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
          pyproject-file: "pyproject.toml"
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install the project dependencies
        run: uv run kedro viz build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Upload to Vercel Blob
        run: |
          find build -type f | while read -r file; do
            # Upload each file to Vercel Blob, preserving the path.
            # e.g., build/index.html will be uploaded to build/index.html in the blob store.
            vercel blob put "$file" --pathname "$file" --token ${{ env.VERCEL_ACCESS_TOKEN }} --force --rw-token ${{ env.VERCEL_BLOB_READ_WRITE_TOKEN }}
          done

      - name: Get package version
        id: package_version
        run: |
          echo "version=$(cat pyproject.toml | grep '^version = ' | head -1 | sed 's/version = \"\([^\"]*\)\"/\1/')" >>$GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.package_version.outputs.version }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false