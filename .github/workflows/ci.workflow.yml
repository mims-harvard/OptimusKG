name: integration
on:
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  install-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate pyproject.toml
        uses: metadata-check/action-validate-pyproject@v1

      - name: Install required-version defined in pyproject.toml
        uses: astral-sh/setup-uv@v5
        id: setup-uv
        with:
          enable-cache: true
          pyproject-file: "pyproject.toml"
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Log if cache was restored
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"

      - name: Print the installed uv version
        run: echo "Installed uv version is ${{ steps.setup-uv.outputs.uv-version }}"

  quality-check:
    needs: install-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for typos
        uses: crate-ci/typos@v1.29.4

      - name: Run MyPy type checker
        run: uv pip install mypy && uv run mypy