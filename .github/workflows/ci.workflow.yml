name: Integration checks

on:
  pull_request:

env:
  CLICOLOR: 1
  PYTHON_VERSION: 3.12
  RUFF_VERSION: 0.9.1 # Using same version as pre-commit-config.yaml 

jobs:
  uv-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        id: setup-uv
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
          pyproject-file: "pyproject.toml"
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Log if uv cache was restored
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"

      - name: Print the installed uv version
        run: echo "Installed uv version is ${{ steps.setup-uv.outputs.uv-version }}"

      - name: Install the project dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv tool run hatch run mypy

      - name: Run bandit
        run: uv tool run hatch run bandit

      - name: Run interrogate
        run: uv tool run hatch run interrogate

  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Spell Check
        uses: crate-ci/typos@v1.29.4

      - name: Formatting
        uses: astral-sh/ruff-action@v3
        with:
          version: ${{ env.RUFF_VERSION }}
          args: --fix --exit-non-zero-on-fix