[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "optimuskg"
version = "1.0.0"
description = "Client library for loading the OptimusKG biomedical knowledge graph from Harvard Dataverse."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.12"
authors = [
  { name = "Lucas Vittor" },
  { name = "Iñaki Arango" },
  { name = "Ayush Noori" },
  { name = "Joaquín Poloneur" },
  { name = "Marinka Zitnik" },
]
keywords = ["knowledge-graph", "biomedical", "dataverse", "networkx", "polars"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Bio-Informatics",
]
dependencies = [
  "polars>=1.19.0",
  "pyarrow>=19.0.0",
  "networkx>=3.0",
  "requests>=2.32.3",
  "platformdirs>=4.0.0",
]

[project.urls]
Homepage = "https://optimuskg.ai"
Repository = "https://github.com/mims-harvard/optimuskg"
Dataset = "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi.org/10.7910/DVN/IYNGEV"

[dependency-groups]
dev = [
  "pytest>=8.0",
  "pytest-mock>=3.12",
  "ruff~=0.1.8",
  "ty",
]

[tool.hatch.build.targets.wheel]
packages = ["src/optimuskg"]

[tool.hatch.build.targets.sdist]
include = ["src/optimuskg", "tests", "README.md", "LICENSE", "pyproject.toml"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
lint.select = ["F", "W", "E", "I", "UP", "PL"]
lint.ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["PLR2004"]

[tool.ty.environment]
python-version = "3.12"
