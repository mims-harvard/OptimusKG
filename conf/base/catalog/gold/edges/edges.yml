_gold_edges_args: &gold_edges_args
  type: polars.CSVDataset
  load_args:
    infer_schema: false
    schema:
      "relation": "${pl:String}"
      "relation_type": "${pl:String}"
      "x_id": "${pl:String}"
      "x_type": "${pl:String}"
      "x_name": "${pl:String}"
      "x_source": "${pl:String}"
      "y_id": "${pl:String}"
      "y_type": "${pl:String}"
      "y_name": "${pl:String}"
      "y_source": "${pl:String}"
      "undirected": "${pl:Boolean}"

gold.edges.exposure_biological_process:
  <<: *gold_edges_args
  filepath: "data/gold/edges/exposure_biological_process.csv"
  metadata:
    checksum: "8076de699b6a489937178a6378c8ab8e"
    kedro-viz:
      layer: gold

