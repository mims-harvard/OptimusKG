gold.metrics.nodes:
  type: optimuskg.datasets.polars.ParquetDataset
  filepath: data/gold/metrics/node_metrics.parquet
  load_args:
    schema:
      label: pl.String
      count: pl.Int64
      percentage: pl.Float64
      properties:
        avg: pl.Float64
        std: pl.Float64
        total: pl.Int64
      degree:
        avg: pl.Float64
        std: pl.Float64
