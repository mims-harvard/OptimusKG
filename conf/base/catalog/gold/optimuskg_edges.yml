gold.optimuskg_edges:
  type: polars.CSVDataset
  filepath: "data/gold/optimuskg_edges.csv"
  load_args:
    infer_schema: false
    schema:
      "relation": "${pl:String}"
      "relation_type": "${pl:String}"
      "x_id": "${pl:String}"
      "x_type": "${pl:String}"
      "x_name": "${pl:String}"
      "x_source": "${pl:String}"
      "y_id": "${pl:String}"
      "y_type": "${pl:String}"
      "y_name": "${pl:String}"
      "y_source": "${pl:String}"
      "undirected": "${pl:Boolean}"
  metadata:
    checksum: ""
    kedro-viz:
      layer: gold