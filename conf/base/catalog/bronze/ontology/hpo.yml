      "hp_id": "${pl:String}"
      "ontology": "${pl:String}"
      "ontology_id": "${pl:String}"
  metadata:
    checksum: "f9ed19eeb850663df363475d646250a6"
    kedro-viz:
      layer: bronze

bronze.ontology.hpo_relations:
  type: polars.CSVDataset
