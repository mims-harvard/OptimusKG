bronze.opentargets.drug_indication:
  type: optimuskg.datasets.polars.ParquetDataset
  filepath: data/bronze/opentargets/drug_indication.parquet
  load_args:
    schema:
      id: pl.String
      approved_indications: pl.List(pl.String)
      metadata:
        indications:
          - disease: pl.String
            efo_name: pl.String
            max_phase_for_indication: pl.Float64
            references:
              - source: pl.String
                ids: pl.List(pl.String)
        indication_count: pl.Int32
  metadata:
    checksum: 0dc00d77ff5e42a35ba51c33dd4b78ea
    kedro-viz:
      layer: bronze
