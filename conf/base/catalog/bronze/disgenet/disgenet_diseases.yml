bronze.disgenet.disgenet_diseases:
  type: polars.CSVDataset
  filepath: "data/bronze/disgenet/disgenet_diseases.csv"
  load_args:
    infer_schema: false
    schema:
      "gene_id": "${pl:Utf8}"
      "gene_symbol": "${pl:Utf8}"
      "dsi": "${pl:Float64}"
      "dpi": "${pl:Utf8}"
      "disease_id": "${pl:Utf8}"
      "disease_name": "${pl:Utf8}"
      "disease_type": "${pl:Utf8}"
      "disease_class": "${pl:Utf8}"
      "disease_semantic_type": "${pl:Utf8}"
      "score": "${pl:Float64}"
      "ei": "${pl:Float64}"
      "year_initial": "${pl:Utf8}"
      "year_final": "${pl:Utf8}"
      "nof_pmids": "${pl:Utf8}"
      "nof_snps": "${pl:Utf8}"
      "source": "${pl:Utf8}"
  metadata:
    checksum: ""
    kedro-viz:
      layer: bronze