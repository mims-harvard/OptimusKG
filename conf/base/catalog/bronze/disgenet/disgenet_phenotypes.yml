bronze.disgenet.disgenet_phenotypes:
  type: polars.CSVDataset
  filepath: "data/bronze/disgenet/disgenet_phenotypes.csv"
  load_args:
    separator: ","
    infer_schema: false
    schema:
      "geneid": "${pl:Utf8}"
      "geneSymbol": "${pl:Utf8}"
      "DSI": "${pl:Float64}"
      "DPI": "${pl:Utf8}"
      "diseaseId": "${pl:Utf8}"
      "diseaseName": "${pl:Utf8}"
      "diseaseType": "${pl:Utf8}"
      "diesaseClass": "${pl:Utf8}"
      "diesaseSemanticType": "${pl:Utf8}"
      "score": "${pl:Float64}"
      "EI": "${pl:Float64}"
      "YearInitial": "${pl:Utf8}"
      "YearFinal": "${pl:Utf8}"
      "NofPmids": "${pl:Utf8}"
      "NofSnps": "${pl:Utf8}"
      "source": "${pl:Utf8}"
  metadata:
    checksum: ""
    kedro-viz:
      layer: bronze