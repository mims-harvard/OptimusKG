bronze.bgee.gene_expressions_in_anatomy:
  type: polars.CSVDataset
  filepath: "data/bronze/bgee/gene_expressions_in_anatomy.csv"
  load_args:
    infer_schema: false
    schema:
      "gene_id": "${pl:String}"
      "gene_name": "${pl:String}"
      "anatomy_id": "${pl:String}"
      "anatomy_name": "${pl:String}"
      "expression": "${pl:String}"
      "call_quality": "${pl:String}"
      "expression_rank": "${pl:String}"