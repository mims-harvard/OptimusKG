landing.reactome.ncbi2_reactome:
  type: polars.CSVDataset
  filepath: "data/landing/reactome/NCBI2Reactome.txt"
  load_args:
    separator: "\t"
    has_header: false
    infer_schema: false
    new_columns:
      [
        "ncbi_id",
        "reactome_id",
        "url",
        "reactome_name",
        "evidence_code",
        "species",
      ]
    schema_overrides:
      "ncbi_id": "${pl:Utf8}"
      "reactome_id": "${pl:String}"
      "url": "${pl:String}"
      "reactome_name": "${pl:String}"
      "evidence_code": "${pl:String}"
      "species": "${pl:String}"
  metadata:
    checksum: "ba321beaf021a4ee6b43ac42b67cc632"
    origin:
      provider: http
      # TODO: Reactome versions are stored in https://zenodo.org/records/15126939, however you can't point to specific files, but rather _all_ the database files, which is ~5GB zipped vs ~29MG for this plain file.
      url: "https://reactome.org/download/current/NCBI2Reactome.txt"
    kedro-viz:
      layer: landing
