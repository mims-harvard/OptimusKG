landing.reactome.reactome_pathways:
  type: polars.CSVDataset
  filepath: "data/landing/reactome/ReactomePathways.txt"
  load_args:
    separator: "\t"
    has_header: false
    infer_schema: false
    new_columns: ["reactome_id", "reactome_name", "species"]
    schema_overrides:
      "reactome_id": "${pl:String}"
      "reactome_name": "${pl:String}"
      "species": "${pl:String}"
  metadata:
    checksum: 78fa7643da79f44ccf9dd868aa932ac8
    origin:
      provider: http
      url: "https://reactome.org/download/current/ReactomePathways.txt"
    kedro-viz:
      layer: landing
