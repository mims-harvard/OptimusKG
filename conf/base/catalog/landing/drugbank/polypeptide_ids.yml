# NOTE: Maybe we should use dataset factories here: https://docs.kedro.org/en/stable/data/kedro_dataset_factories.html
landing.drugbank.carrier:
  type: polars.CSVDataset
  filepath: "data/landing/drugbank/drugbank_all_carrier_polypeptide_ids.csv"
  load_args:
    infer_schema: false
    schema: &drugbank_schema
      "ID": "${pl:String}"
      "Name": "${pl:String}"
      "Gene Name": "${pl:String}"
      "GenBank Protein ID": "${pl:String}"
      "GenBank Gene ID": "${pl:String}"
      "UniProt ID": "${pl:String}"
      "Uniprot Title": "${pl:String}"
      "PDB ID": "${pl:String}"
      "GeneCard ID": "${pl:String}"
      "GenAtlas ID": "${pl:String}"
      "HGNC ID": "${pl:String}"
      "Species": "${pl:String}"
      "Drug IDs": "${pl:String}"

landing.drugbank.enzyme:
  type: polars.CSVDataset
  filepath: "data/landing/drugbank/drugbank_all_enzyme_polypeptide_ids.csv"
  load_args:
    infer_schema: false
    schema: *drugbank_schema

landing.drugbank.target:
  type: polars.CSVDataset
  filepath: "data/landing/drugbank/drugbank_all_target_polypeptide_ids.csv"
  load_args:
    infer_schema: false
    schema: *drugbank_schema

landing.drugbank.transporter:
  type: polars.CSVDataset
  filepath: "data/landing/drugbank/drugbank_all_transporter_polypeptide_ids.csv"
  load_args:
    infer_schema: false
    schema: *drugbank_schema