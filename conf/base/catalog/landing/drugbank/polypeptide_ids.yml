_landing_drugbank_args: &landing_drugbank_args
  type: polars.CSVDataset
  load_args:
    infer_schema: false
    schema:
      "ID": "${pl:String}"
      "Name": "${pl:String}"
      "Gene Name": "${pl:String}"
      "GenBank Protein ID": "${pl:String}"
      "GenBank Gene ID": "${pl:String}"
      "UniProt ID": "${pl:String}"
      "Uniprot Title": "${pl:String}"
      "PDB ID": "${pl:String}"
      "GeneCard ID": "${pl:String}"
      "GenAtlas ID": "${pl:String}"
      "HGNC ID": "${pl:String}"
      "Species": "${pl:String}"
      "Drug IDs": "${pl:String}"


landing.drugbank.carrier:
  <<: *landing_drugbank_args
  filepath: "data/landing/drugbank/drugbank_all_carrier_polypeptide_ids.csv"
  metadata:
    checksum: f16deafa6e6ae485b464eaeef814d84e
    kedro-viz:
        layer: landing

landing.drugbank.enzyme:
  <<: *landing_drugbank_args
  filepath: "data/landing/drugbank/drugbank_all_enzyme_polypeptide_ids.csv"
