landing.drugbank.gene_map:
  type: polars.CSVDataset
  filepath: "data/landing/drugbank/drugbank_gene_map.tsv"
  load_args:
    separator: "\t"
    infer_schema: false
    schema:
      "NCBI Gene ID(supplied by NCBI)": "${pl:Utf8}"
      "UniProt ID(supplied by UniProt)": "${pl:Utf8}"
  metadata:
    checksum: "281090c34eb94f80c4b959dd1cf35be0"
    origin:
      private: true
      provider: "http"
      url: "https://www.genenames.org/cgi-bin/download/custom?col=md_eg_id&col=md_prot_id&status=Approved&hgnc_dbtag=on&order_by=gd_app_sym_sort&format=text&submit=submit"
    kedro-viz:
      layer: landing