landing.gene_names.gene_names:
  type: polars.CSVDataset
  filepath: "data/landing/gene_names/gene_names.tsv"
  load_args:
    separator: "\t"
    infer_schema: false
    schema_overrides:
      "Approved symbol": "${pl:String}"
      "Approved name": "${pl:String}"
      "Accession numbers": "${pl:String}"
      "RefSeq IDs": "${pl:String}"
      "NCBI Gene ID": "${pl:String}"
      "NCBI Gene ID(supplied by NCBI)": "${pl:String}"
      "UniProt ID(supplied by UniProt)": "${pl:String}"
      "OMIM ID(supplied by OMIM)": "${pl:String}"
  metadata:
    checksum: "1761eb5f524feb84531f174f2baf0f80"
    origin:
      provider: "http"
      url: "https://www.genenames.org/cgi-bin/download/custom?col=gd_app_sym&col=gd_app_name&col=gd_pub_acc_ids&col=gd_pub_refseq_ids&col=gd_pub_eg_id&col=md_eg_id&col=md_prot_id&col=md_mim_id&status=Approved&hgnc_dbtag=on&order_by=gd_app_sym_sort&format=text&submit=submit"
