silver.disease_protein:
  type: polars.CSVDataset
  filepath: "data/silver/disease_protein.csv"
  load_args:
    infer_schema: false
    schema:
      "relation": "${pl:String}"
      "relation_type": "${pl:String}"
      "x_id": "${pl:String}"
      "x_type": "${pl:String}"
      "x_name": "${pl:String}"
      "x_source": "${pl:String}"
      "y_id": "${pl:String}"
      "y_type": "${pl:String}"
      "y_name": "${pl:String}"
      "y_source": "${pl:String}"
      "log2_fold_change_value": "${pl:Float64}"
      "disease_specificity_index": "${pl:Float64}"
      "disease_pleiotropy_index": "${pl:Float64}"
      "evidence_index": "${pl:Float64}"
      "number_of_pmids": "${pl:Int16}"
      "number_of_snps": "${pl:Int16}"
      "disgenet_score": "${pl:Float64}"
  metadata:
    kedro-viz:
      layer: silver 