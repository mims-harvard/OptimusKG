[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
requires-python = ">=3.12"
name = "optimuskg"
readme = "README.md"
version = "0.3.0"
dependencies = [
  "ipython>=8.10",
  "jupyterlab>=3.0",
  "notebook",
  "kedro[jupyter]~=0.19.10",
  "kedro-datasets[pandas-csvdataset, pandas-jsondataset, polars-csvdataset]>=3.0",
  "typedframe>=0.11.0",
  "polars>=1.19.0",
  "biocypher>=0.6.1",
  "requests>=2.32.3",
  "aiohttp>=3.11.11",
  "goatools>=1.4.12",
  "lxml>=5.3.0",
  "pandas-stubs>=2.2.3.241126",
  "types-openpyxl>=3.1.5.20241225",
  "lxml-stubs>=0.5.1",
  "psycopg2-binary>=2.9.10",
  "pyarrow>=19.0.0",
  "sqlalchemy>=2.0.37",
]

[project.optional-dependencies]
docs = [
  "docutils<0.18.0",
  "sphinx~=3.4.3",
  "sphinx_rtd_theme==0.5.1",
  "nbsphinx==0.8.1",
  "sphinx-autodoc-typehints==1.11.1",
  "sphinx_copybutton==0.3.1",
  "ipykernel>=5.3, <7.0",
  "Jinja2<3.1.0",
  "myst-parser~=0.17.2",
]
dev = [
  "pytest-cov~=3.0",
  "pytest-mock>=1.7.1, <2.0",
  "pytest~=7.2",
  "ruff~=0.1.8",
  "pre-commit>=4.0.1",
  "mypy>=1.14.1",
  "bandit>=1.8.2",
  "interrogate>=1.7.0",
]

[project.scripts]
optimuskg = "optimuskg.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/optimuskg"]

[tool.hatch.envs.default]
path = ".venv"

[tool.hatch.envs.default.scripts]
list = ["hatch env show --json | jq --raw-output '.default.scripts | keys[]'"]
mypy = 'uv tool run mypy --install-types --config-file pyproject.toml --non-interactive --python-executable=$(uv run python -c "import sys; print(sys.executable)") -p src -p tests'
bandit = 'uv tool run bandit -v -c pyproject.toml -r src/* tests/*'
interrogate = 'uv tool run interrogate --config pyproject.toml'
download_landing_files = 'uv run bash scripts/download_landing_files.sh'
clean = 'uv run bash scripts/clean_files.sh'

[tool.uv]
required-version = ">=0.5.18"

[tool.kedro]
package_name = "optimuskg"
project_name = "OptimusKG"
kedro_init_version = "0.19.10"
source_dir = "src"

[tool.pytest.ini_options]
addopts = """
--cov-report term-missing \
--cov src/optimuskg -ra"""

[tool.coverage.report]
fail_under = 0
show_missing = true
exclude_lines = ["pragma: no cover", "raise NotImplementedError"]

[tool.pyright]
venvPath = "."
venv = ".venv"

[tool.typos.default.extend-words]
# Don't correct the OpenTargets Abbreviation
ot = "ot"

[tool.ruff.format]
docstring-code-format = true

[tool.ruff]
line-length = 88
show-fixes = true
lint.select = [
  "F",    # Pyflakes
  "W",    # pycodestyle
  "E",    # pycodestyle
  "I",    # isort
  "UP",   # pyupgrade
  "PL",   # Pylint
  "T201", # Print Statement
]
lint.ignore = ["E501"] # Ruff format takes care of line-too-long

[tool.kedro_telemetry]
project_id = "dc32d474bbc84fc49bf67c0f87edf02e"

[tool.bandit]
skips = ["B101"]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = false
ignore-semiprivate = false
ignore-private = false
ignore-property-decorators = false
ignore-module = false
fail-under = 10
verbose = 2
quiet = false
color = true

[tool.mypy]
warn_unused_configs = true
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
show_error_codes = true

[[tool.mypy.overrides]]
module = "fsspec.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "goatools.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "biocypher.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "typedframe.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pytest.*"
ignore_missing_imports = true
