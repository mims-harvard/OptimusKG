repos:
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/crate-ci/typos
    rev: v1.29.4
    hooks:
      - id: typos

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        require_serial: true

  - repo: local
    hooks:
      - id: bandit
        name: bandit
        language: system
        entry: make bandit
        types: [python]
        
      - id: mypy
        name: mypy
        language: system
        entry: make mypy
        types: [python]
        pass_filenames: false

      - id: interrogate
        name: interrogate
        language: system
        entry: make interrogate
        pass_filenames: false

      - id: pytest
        name: pytest
        language: system
        entry: make pytest
        pass_filenames: false
        types: [python]
